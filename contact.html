<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Fake & Gabe</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="static-overlay"></div>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo"><span>FAKE</span><span class="amp">&</span><span>GABE</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="episodes.html">Episodes</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </div>
</nav>

<section style="padding-top:56px;">
  <div class="wrap">
    <div class="section-head">
      <div class="eyebrow">Get In Touch</div>
      <h2>Send Us Something Real</h2>
    </div>

    <form class="contact-form" action="#" method="POST">
      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
      </div>
      <button type="submit" class="btn primary" style="justify-self:start;">Send Message</button>
    </form>

    <div style="margin-top:48px;">
      <div class="eyebrow" style="margin-bottom:14px;">Follow the Show</div>
      <div class="social-row">
        <a href="#">Instagram</a>
        <a href="#">TikTok</a>
        <a href="#">YouTube</a>
        <a href="#">Twitter / X</a>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="wrap">
    <div class="nav-logo"><span>FAKE</span><span class="amp">&</span><span>GABE</span></div>
    <div class="foot-links">

    </div>

  </div>
</footer>

</body>
</html>
